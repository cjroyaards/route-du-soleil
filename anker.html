<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Ankerwacht — Pieternel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
main{max-width:820px}
#banner{border-radius:14px;padding:18px 22px;margin-bottom:18px;font-weight:700;font-size:1.15em;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
#banner.ok{background:#e7f3ea;color:#1e6b33}
#banner.alarm{background:#fdeaea;color:#a02020;animation:knipper 1s infinite}
#banner.stale{background:#fdf3e0;color:#8a6a2f}
@keyframes knipper{50%{opacity:.55}}
#ankerMap{height:420px;border-radius:14px;z-index:0;box-shadow:0 2px 14px rgba(22,57,92,.10)}
.tegels{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:18px 0}
.tegel{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 2px 10px rgba(22,57,92,.07);text-align:center}
.tegel .w{font-family:'Space Grotesk',sans-serif;font-size:1.5em;font-weight:700;color:#16395c}
.tegel .l{color:#6b7a8a;font-size:.85em;margin-top:2px}
.windpijl{display:inline-block;transition:transform .5s}
.opties{color:#6b7a8a;font-size:.9em;margin-top:14px}
.opties label{cursor:pointer}
</style>
</head>
<body>

<header>
  <h1>⚓ Ankerwacht</h1>
  <p>Pieternel · ververst elke 30 s</p>
</header>

<main>
  <div id="banner" class="stale">Laden…</div>
  <div id="ankerMap"></div>
  <div class="tegels">
    <div class="tegel"><div class="w" id="t-dist">—</div><div class="l">afstand tot ankerpunt</div></div>
    <div class="tegel"><div class="w" id="t-radius">—</div><div class="l">alarmradius</div></div>
    <div class="tegel"><div class="w" id="t-wind">—</div><div class="l">wind</div></div>
    <div class="tegel"><div class="w" id="t-depth">—</div><div class="l">diepte</div></div>
    <div class="tegel"><div class="w" id="t-since">—</div><div class="l">voor anker sinds</div></div>
  </div>
  <div class="opties">
    <label><input type="checkbox" id="geluid"> geluidsalarm in deze browser (laat het scherm aan)</label>
  </div>
</main>

<footer><a href="index.html">← Route du Soleil</a></footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const ANKER_URL='https://raw.githubusercontent.com/cjroyaards/route-du-soleil/main/data/anker.json';
const STALE_MIN=6; // geen update in 6 min = waarschuwing (push-interval is 2 min)

let map=null, ring=null, boot=null, sliert=[], ankerMark=null, alarmWasAf=true;

const geluidBox=document.getElementById('geluid');
geluidBox.checked=localStorage.getItem('anker_geluid')==='1';
geluidBox.onchange=()=>localStorage.setItem('anker_geluid',geluidBox.checked?'1':'0');

function piep(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value=880; g.gain.value=.4;
    o.start(); o.stop(ctx.currentTime+.6);
  }catch(e){}
}

const windRoos=d=>['N','NNO','NO','ONO','O','OZO','ZO','ZZO','Z','ZZW','ZW','WZW','W','WNW','NW','NNW'][Math.round(d/22.5)%16];
const f1=v=>v==null?'—':v.toFixed(1).replace('.',',');

function banner(cls,txt){ const b=document.getElementById('banner'); b.className=cls; b.innerHTML=txt; }

function tekenKaart(d){
  if(!window.L) return;
  const c=[d.pos[0],d.pos[1]];
  if(!map){
    map=L.map('ankerMap',{zoomControl:true,attributionControl:false}).setView(c,16);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  }
  [ring,boot,ankerMark,...sliert].forEach(l=>l&&map.removeLayer(l)); sliert=[];
  if(d.anchor){
    ring=L.circle([d.anchor.lat,d.anchor.lon],{radius:d.anchor.radius,color:d.alarm?'#c33':'#2a7a3f',weight:2,fillOpacity:.06}).addTo(map);
    ankerMark=L.marker([d.anchor.lat,d.anchor.lon],{icon:L.divIcon({html:'<div style="font-size:18px">⚓</div>',className:'',iconSize:[20,20],iconAnchor:[10,10]})}).addTo(map);
  }
  // zwaaipatroon: oud = licht, vers = donker
  const h=d.hist||[];
  const n=h.length;
  h.forEach((p,i)=>{
    const op=.15+.75*(i/Math.max(1,n-1));
    sliert.push(L.circleMarker([p[1],p[2]],{radius:3,stroke:false,fillColor:'#16395c',fillOpacity:op}).addTo(map));
  });
  boot=L.marker(c,{icon:L.divIcon({html:'<div style="font-size:26px">⛵</div>',className:'',iconSize:[30,30],iconAnchor:[15,15]})}).addTo(map);
  if(d.anchor) map.fitBounds(ring.getBounds().pad(0.35));
}

async function ververs(){
  let d;
  try{
    const r=await fetch(ANKER_URL+'?t='+Date.now(),{cache:'no-store'});
    if(!r.ok) throw new Error(r.status);
    d=await r.json();
  }catch(e){
    banner('stale','Ankerdata (nog) niet beschikbaar — is de ankerwacht al actief? De plugin zet hem automatisch aan zodra de boot 10 minuten stilligt.');
    return;
  }

  const ouderdomMin=(Date.now()-new Date(d.updated).getTime())/60000;
  const tijd=new Date(d.updated).toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});

  document.getElementById('t-dist').textContent=d.distM!=null?d.distM+' m':'—';
  document.getElementById('t-radius').textContent=d.anchor?d.anchor.radius+' m':'—';
  document.getElementById('t-wind').innerHTML=d.wind&&d.wind.kn!=null
    ?`<span class="windpijl" style="transform:rotate(${(d.wind.dir??0)+180}deg)">↑</span> ${f1(d.wind.kn)} kn${d.wind.dir!=null?' · '+windRoos(d.wind.dir):''}`:'—';
  document.getElementById('t-depth').textContent=d.depth!=null?f1(d.depth)+' m':'—';
  document.getElementById('t-since').textContent=d.anchor?new Date(d.anchor.since).toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'}):'—';

  tekenKaart(d);

  if(ouderdomMin>STALE_MIN){
    banner('stale',`⚠️ Geen verse data — laatste update ${tijd} (${Math.round(ouderdomMin)} min geleden). Starlink/stroom aan boord checken; géén data is óók een signaal.`);
    return;
  }
  if(!d.active){
    banner('stale',`Ankerwacht niet actief (boot vaart of is net vertrokken). Laatste update ${tijd}.`);
    return;
  }
  if(d.alarm){
    banner('alarm',`🚨 ANKERALARM — boot is ${d.distM} m van het ankerpunt (ring ${d.anchor.radius} m). Update ${tijd}.`);
    if(geluidBox.checked&&alarmWasAf) piep();
    alarmWasAf=false;
  }else{
    banner('ok',`✓ Alles goed — ${d.distM} m van het ankerpunt, binnen de ring. Update ${tijd}.`);
    alarmWasAf=true;
  }
}

ververs();
setInterval(ververs,30000);
</script>
</body>
</html>
